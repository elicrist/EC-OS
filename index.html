<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOS">
<meta name="theme-color" content="#0e0e0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/sos_final_180.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#000000}
#ringGlow, #letterGlow {
  animation: colorCycle 12s ease-in-out infinite;
}
@keyframes colorCycle {
  0%, 14%   { background-color: #ff3b30; }
  16.6%, 30.6% { background-color: #ff9500; }
  33.3%, 47.3% { background-color: #ffcc00; }
  50%, 64%  { background-color: #34c759; }
  66.6%, 80.6% { background-color: #5b8def; }
  83.3%, 97.3% { background-color: #af52de; }
  100% { background-color: #ff3b30; }
}
</style>
</head>
<body>
<!--
  New app entry point: splash badge -> click -> intro video -> landing
  (Get started / Sign in). Ported from the tuned sos-full-sequence.html
  reference verbatim for the animation/timing/asset handling. The
  sign-in form that used to live at index.html now lives at login.html;
  this file is the gate everyone passes through first. Badge/mask/video
  are real files under media/ instead of the reference's embedded
  base64 — the reference's second, hidden <img> and <video> (unused,
  unreferenced, never unhidden) were dropped rather than ported.
-->
<div id="glowScreen" style="width:100vw;height:100vh;background:#000000;display:none;align-items:center;justify-content:center;font-family:sans-serif;cursor:pointer;overflow:hidden;margin:0;position:relative;">
  <div style="position:relative;width:100vmin;height:100vmin;z-index:1;filter:brightness(0.763);">
    <img src="media/splash-badge.png" style="width:100%;height:100%;display:block;object-fit:contain;">
    <div id="ringGlow" style="position:absolute;inset:0;mix-blend-mode:color;opacity:0.22;pointer-events:none;
         -webkit-mask-image:radial-gradient(circle closest-side, transparent 79.5%, black 80.5%, black 88%, transparent 89%);
         mask-image:radial-gradient(circle closest-side, transparent 79.5%, black 80.5%, black 88%, transparent 89%);"></div>
    <div id="letterGlow" style="position:absolute;inset:0;mix-blend-mode:color;opacity:0.75;pointer-events:none;
         -webkit-mask-image:url(media/splash-badge-mask.png);
         mask-image:url(media/splash-badge-mask.png);
         -webkit-mask-size:contain;
         mask-size:contain;
         -webkit-mask-repeat:no-repeat;
         mask-repeat:no-repeat;"></div>
  </div>
</div>

<div id="videoScreen" style="display:none;width:100vw;height:100vh;background:#000000;margin:0;overflow:hidden;position:relative;align-items:center;justify-content:center;">
  <div style="position:relative;width:100vmin;height:100vmin;z-index:1;display:flex;align-items:center;justify-content:center;overflow:hidden;">
    <video id="introVideo" src="media/splash-intro.mp4" autoplay muted playsinline
      style="width:100%;height:100%;object-fit:contain;display:block;transform:scale(1.3086);"></video>
  </div>
</div>

<div id="landingScreen" style="display:none;min-height:100vh;background:#ffffff;align-items:center;justify-content:center;font-family:sans-serif;color:#fff;transition:background-color 1.2s ease;">
  <div style="max-width:380px;width:100%;padding:32px;text-align:center;">
    <div style="width:76px;height:76px;border-radius:20px;margin:0 auto 24px;overflow:hidden;background:#1e1e1e;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:22px;font-weight:800;color:#fff;">SOS</span>
    </div>
    <div style="font-size:24px;font-weight:700;margin-bottom:8px;">Simple Operating Systems</div>
    <div style="font-size:14px;color:#888;line-height:1.5;margin-bottom:40px;">One place for the parts of life you actually want to track.</div>
    <button id="signupBtn" style="width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;margin-bottom:12px;">Get started</button>
    <button id="signinBtn" style="width:100%;padding:14px;background:transparent;border:1px solid #3a3a3a;border-radius:10px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;">Sign in</button>
  </div>
</div>

<script src="public/auth.js"></script>
<script>
// Already-authenticated visitors skip the splash entirely and land on the
// hub, same as the old index.html's login form did — glowScreen stays
// display:none (set above) until we know that check came back false, so
// there's no visible flash of the intro animation before the redirect.
(async function(){
  const authed = await initAuth();
  if(authed){ window.location.href='hub.html'; return; }
  document.getElementById('glowScreen').style.display='flex';
})();

const accent = '#5B8DEF';
document.getElementById('signupBtn').style.background = accent;
document.getElementById('signinBtn').addEventListener('mouseenter', e => e.target.style.borderColor = accent);
document.getElementById('signinBtn').addEventListener('mouseleave', e => e.target.style.borderColor = '#3a3a3a');

document.getElementById('signupBtn').addEventListener('click', () => window.location.href='signup.html');
document.getElementById('signinBtn').addEventListener('click', () => window.location.href='login.html');

const glowScreen = document.getElementById('glowScreen');
const ringGlow = document.getElementById('ringGlow');
const letterGlow = document.getElementById('letterGlow');
const videoScreen = document.getElementById('videoScreen');
const video = document.getElementById('introVideo');
const landing = document.getElementById('landingScreen');

glowScreen.addEventListener('click', () => {
  const currentRing = getComputedStyle(ringGlow).backgroundColor;
  const currentLetter = getComputedStyle(letterGlow).backgroundColor;

  ringGlow.style.animation = 'none';
  letterGlow.style.animation = 'none';
  ringGlow.style.backgroundColor = currentRing;
  letterGlow.style.backgroundColor = currentLetter;

  void ringGlow.offsetWidth;

  ringGlow.style.transition = 'background-color 0.7s ease';
  letterGlow.style.transition = 'background-color 0.7s ease';
  ringGlow.style.backgroundColor = '#ffffff';
  letterGlow.style.backgroundColor = '#ffffff';

  setTimeout(() => {
    glowScreen.style.display = 'none';
    videoScreen.style.display = 'flex';
  }, 700);
});

video.addEventListener('ended', () => {
  videoScreen.style.display = 'none';
  landing.style.display = 'flex';
  landing.style.background = '#ffffff';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      landing.style.background = '#141414';
    });
  });
});
</script>
</body>
</html>
