<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOS">
<meta name="theme-color" content="#0e0e0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/sos_final_180.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@view-transition { navigation: auto; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--surface:#161618;--card:#1c1c1f;--border:#2a2a2e;--border-light:#333338;
  --text:#f0ede8;--muted:#888880;--faint:#2a2a2e;
  --danger:#e05b5b;--ok:#4ade80;
}
/* No --accent/--accent-default variable here at all, on purpose: this page
   renders before any user is authenticated, so there is no owner whose
   theme it would even be correct to read. Every focus/hover/glow state
   below is hardcoded to white directly, deliberately, as the universal
   pre-auth default. */
[data-theme="light"]{
  --bg:#f4f4f2;--surface:#ffffff;--card:#ffffff;--border:#e2e0da;--border-light:#d3d0c8;
  --text:#1a1a18;--muted:#6b6a63;--faint:#ece9e2;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;max-width:360px;width:100%}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;margin-bottom:.9rem}
.form-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:.9rem;flex-wrap:wrap}
input{background:var(--surface);border:1px solid var(--border-light);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:7px 10px;border-radius:7px;outline:none;width:100%;transition:border-color .15s}
input:focus{border-color:#fff}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s;width:100%}
.btn:hover:not(:disabled){border-color:#fff;color:#fff}
.btn-primary{background:color-mix(in srgb,#fff 14%,var(--card));border-color:#fff;color:#fff;box-shadow:0 0 16px -3px color-mix(in srgb,#fff 45%,transparent)}
.btn-primary:disabled{opacity:.5;cursor:default}
.auth-crosslink{text-align:center;font-size:12px;color:var(--muted);margin-top:14px}
.auth-crosslink a{color:#fff;text-decoration:none}
.auth-crosslink a:hover{text-decoration:underline}
</style>
<script>
// Fixed app default theme — nobody's signed in on a pre-auth screen like
// this one, so there's no owner whose saved theme it would be correct to
// read. Same reasoning as login.html/signup.html. Accent color isn't part
// of this at all anymore — every focus/hover state on this page is a
// hardcoded white in the CSS above, not read from any variable.
document.documentElement.setAttribute('data-theme','dark');
</script>
</head>
<body>
<div id="forgot-screen">
  <div class="card">
    <div class="section-title">Reset password</div>
    <p style="color:var(--muted);font-size:12px;margin:10px 0 18px">Enter your email and we'll send you a link to reset your password.</p>
    <div class="form-row" style="margin-bottom:1rem">
      <input type="email" id="forgot-email" placeholder="Email" autocomplete="username" onkeydown="if(event.key==='Enter') handleForgotPassword()">
    </div>
    <button class="btn btn-primary" id="forgot-btn" onclick="handleForgotPassword()">Send reset link</button>
    <div id="forgot-message" style="font-size:12px;margin-top:10px;min-height:18px"></div>
    <div class="auth-crosslink"><a href="login.html">Back to sign in</a></div>
  </div>
</div>
<script src="public/auth.js"></script>
<script>
// Deliberately shows the SAME confirmation message whether or not the email
// belongs to a real account — Supabase's /auth/v1/recover endpoint already
// returns 200 either way (its own anti-enumeration design), and this page
// doesn't second-guess that by branching client-side on the response body.
// Only genuine request failures (network error, malformed input) get a
// different message.
const handleForgotPassword=async()=>{
  const btn=document.getElementById('forgot-btn');
  const msgEl=document.getElementById('forgot-message');
  const emailEl=document.getElementById('forgot-email');
  const email=emailEl.value.trim();
  msgEl.textContent='';
  msgEl.style.color='var(--danger)';
  if(!email){msgEl.textContent='Enter your email.';return;}

  btn.disabled=true;btn.textContent='Sending…';
  try{
    const redirectTo=new URL('reset-password.html',window.location.href).href;
    const url=`${SB_URL}/auth/v1/recover?redirect_to=${encodeURIComponent(redirectTo)}`;
    const resp=await fetch(url,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json'},body:JSON.stringify({email})});
    if(!resp.ok){
      const data=await resp.json().catch(()=>null);
      console.error('Recover request failed',{status:resp.status,data});
      msgEl.style.color='var(--danger)';
      msgEl.textContent=data?.msg||data?.error_description||'Something went wrong. Try again.';
      btn.disabled=false;btn.textContent='Send reset link';
      return;
    }
    msgEl.style.color='var(--ok)';
    msgEl.textContent='If an account exists for that email, a reset link is on its way.';
    btn.disabled=true;btn.textContent='Sent';
  }catch(e){
    console.error('Recover request error',e);
    msgEl.style.color='var(--danger)';
    msgEl.textContent='Something went wrong. Try again.';
    btn.disabled=false;btn.textContent='Send reset link';
  }
};

(async function(){
  const authed=await initAuth();
  if(authed) window.location.href='hub.html';
})();
</script>
</body>
</html>
