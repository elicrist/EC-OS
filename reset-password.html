<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOS">
<meta name="theme-color" content="#0e0e0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/sos_final_180.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--surface:#161618;--card:#1c1c1f;--border:#2a2a2e;--border-light:#333338;
  --text:#f0ede8;--muted:#888880;--faint:#2a2a2e;
  --accent:#e07b4a;--danger:#e05b5b;--ok:#4ade80;
  --accent-default:#e07b4a;
}
[data-theme="light"]{
  --bg:#f4f4f2;--surface:#ffffff;--card:#ffffff;--border:#e2e0da;--border-light:#d3d0c8;
  --text:#1a1a18;--muted:#6b6a63;--faint:#ece9e2;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;max-width:360px;width:100%}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;margin-bottom:.9rem}
.form-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:.9rem;flex-wrap:wrap}
input{background:var(--surface);border:1px solid var(--border-light);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:7px 10px;border-radius:7px;outline:none;width:100%;transition:border-color .15s}
input:focus{border-color:var(--accent)}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s;width:100%}
.btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-primary{background:color-mix(in srgb,var(--accent) 14%,var(--card));border-color:var(--accent);color:var(--accent);box-shadow:0 0 16px -3px color-mix(in srgb,var(--accent) 45%,transparent)}
.btn-primary:disabled{opacity:.5;cursor:default}
.auth-crosslink{text-align:center;font-size:12px;color:var(--muted);margin-top:14px}
.auth-crosslink a{color:var(--accent);text-decoration:none}
.auth-crosslink a:hover{text-decoration:underline}
.pw-checklist{display:flex;flex-direction:column;gap:3px;margin:2px 0 12px;font-size:11px}
.pw-check{color:var(--muted);transition:color .15s}
.pw-check.met{color:var(--ok)}
.pw-check-icon{display:inline-block;width:14px}
</style>
<script>
// Fixed app default theme — this page is reached from a raw email link, not
// from within the app, so there's no reliable owner context to read a
// scoped theme from even once the recovery token is parsed below. Same
// reasoning as login.html/signup.html.
document.documentElement.setAttribute('data-theme','dark');
document.documentElement.style.setProperty('--accent','#B3A369');
document.documentElement.style.setProperty('--accent-default','#B3A369');
</script>
</head>
<body>
<div id="reset-screen">
  <div class="card">
    <div class="section-title">Set a new password</div>
    <p id="reset-intro" style="color:var(--muted);font-size:12px;margin:10px 0 18px">Choose a new password for your account.</p>
    <div id="reset-form">
      <div class="form-row" style="margin-bottom:0.5rem">
        <input type="password" id="reset-password" placeholder="New password" autocomplete="new-password" oninput="checkPasswordStrength(this.value)" onkeydown="if(event.key==='Enter') document.getElementById('reset-password-confirm').focus()">
      </div>
      <div class="pw-checklist" id="pw-checklist">
        <div class="pw-check" id="pw-check-length"><span class="pw-check-icon">○</span>At least 10 characters</div>
        <div class="pw-check" id="pw-check-upper"><span class="pw-check-icon">○</span>1 uppercase letter</div>
        <div class="pw-check" id="pw-check-number"><span class="pw-check-icon">○</span>1 number</div>
        <div class="pw-check" id="pw-check-special"><span class="pw-check-icon">○</span>1 special character</div>
      </div>
      <div class="form-row" style="margin-bottom:1rem">
        <input type="password" id="reset-password-confirm" placeholder="Confirm new password" autocomplete="new-password" onkeydown="if(event.key==='Enter') handleResetPassword()">
      </div>
      <button class="btn btn-primary" id="reset-btn" onclick="handleResetPassword()">Update password</button>
      <div id="reset-error" style="color:var(--danger);font-size:12px;margin-top:10px;min-height:18px"></div>
    </div>
    <div class="auth-crosslink"><a href="login.html">Back to sign in</a></div>
  </div>
</div>
<script src="public/auth.js"></script>
<script>
// Password strength rules — shared verbatim with signup.html (same
// no-shared-module pattern as everything else here, so it's duplicated, not
// imported). Real-time checklist, not just a rejection on submit.
const PW_RULES={
  length:pw=>pw.length>=10,
  upper:pw=>/[A-Z]/.test(pw),
  number:pw=>/[0-9]/.test(pw),
  special:pw=>/[^A-Za-z0-9]/.test(pw),
};
const checkPasswordStrength=pw=>{
  let allMet=true;
  for(const key in PW_RULES){
    const met=PW_RULES[key](pw);
    if(!met)allMet=false;
    const el=document.getElementById(`pw-check-${key}`);
    if(el){el.classList.toggle('met',met);el.querySelector('.pw-check-icon').textContent=met?'✓':'○';}
  }
  return allMet;
};

// Reached from the "reset password" email link (forgot-password.html's
// redirect_to). Supabase's recovery redirect appends the session as a URL
// hash fragment, same implicit-grant mechanism as the signup confirmation
// link confirm.html handles — #access_token=...&type=recovery on success,
// or #error=...&error_description=... if the link was already used or has
// expired. Deliberately does NOT call setAuthSession()/auto-login here like
// confirm.html does — the recovery access_token is used directly as the
// bearer token for the PUT /auth/v1/user call below, and the user signs in
// fresh with their new password afterward instead.
let recoveryAccessToken=null;

const showFatalError=msg=>{
  document.getElementById('reset-intro').textContent=msg;
  document.getElementById('reset-form').style.display='none';
};

(function(){
  const hash=new URLSearchParams(window.location.hash.replace(/^#/,''));
  const errorDescription=hash.get('error_description')||hash.get('error');
  if(errorDescription){
    console.error('Password reset link error',errorDescription);
    showFatalError(decodeURIComponent(errorDescription.replace(/\+/g,' '))+' Request a new reset link from the sign-in page.');
    return;
  }
  const accessToken=hash.get('access_token');
  if(!accessToken||hash.get('type')!=='recovery'){
    showFatalError('This reset link is missing or invalid. Request a new one from the sign-in page.');
    return;
  }
  recoveryAccessToken=accessToken;
  history.replaceState(null,'',window.location.pathname);
})();

const handleResetPassword=async()=>{
  const btn=document.getElementById('reset-btn');
  const errEl=document.getElementById('reset-error');
  const pwEl=document.getElementById('reset-password');
  const pwConfirmEl=document.getElementById('reset-password-confirm');
  const pw=pwEl.value;
  const pwConfirm=pwConfirmEl.value;
  errEl.textContent='';
  if(!recoveryAccessToken){errEl.textContent='This reset link is no longer valid.';return;}
  if(!checkPasswordStrength(pw)){errEl.textContent='Password doesn\'t meet all the requirements above.';return;}
  if(pw!==pwConfirm){errEl.textContent='Passwords don\'t match.';return;}

  btn.disabled=true;btn.textContent='Updating…';
  try{
    const resp=await fetch(`${SB_URL}/auth/v1/user`,{method:'PUT',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${recoveryAccessToken}`,'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    const data=await resp.json().catch(()=>null);
    if(!resp.ok){
      console.error('Password update failed',{status:resp.status,data});
      errEl.textContent=data?.msg||data?.error_description||'Could not update password. Try again.';
      btn.disabled=false;btn.textContent='Update password';
      return;
    }
    window.location.href='login.html?reset=success';
  }catch(e){
    console.error('Password update error',e);
    errEl.textContent='Something went wrong. Try again.';
    btn.disabled=false;btn.textContent='Update password';
  }
};
</script>
</body>
</html>
