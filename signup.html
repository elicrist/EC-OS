<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOS</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOS">
<meta name="theme-color" content="#0e0e0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/sos_final_180.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* Enables the browser's native cross-fade between same-origin page
   navigations (hub<->page<->index/login/signup) — no JS needed. Degrades
   to today's instant snap on browsers without support (e.g. Firefox).
   Doesn't affect in-page interactions (tab switches, widget adds, etc.)
   since those never trigger a real navigation. */
@view-transition { navigation: auto; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0f;--surface:#161618;--card:#1c1c1f;--border:#2a2a2e;--border-light:#333338;
  --text:#f0ede8;--muted:#888880;--faint:#2a2a2e;
  --accent:#e07b4a;--danger:#e05b5b;--ok:#4ade80;
  /* App-wide theme accent, set from the user's Appearance choice (page.html
     Settings) — see the flash-prevention script right after this style
     block. signup.html has no per-page concept, so --accent itself gets
     overridden to the same theme value too (unlike page.html, which keeps
     --accent/--accent-default distinct for its per-page dot_color). */
  --accent-default:#e07b4a;
}
[data-theme="light"]{
  --bg:#f4f4f2;--surface:#ffffff;--card:#ffffff;--border:#e2e0da;--border-light:#d3d0c8;
  --text:#1a1a18;--muted:#6b6a63;--faint:#ece9e2;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;max-width:360px;width:100%}
.section-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;margin-bottom:.9rem}
.form-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:.9rem;flex-wrap:wrap}
input{background:var(--surface);border:1px solid var(--border-light);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:7px 10px;border-radius:7px;outline:none;width:100%;transition:border-color .15s}
input:focus{border-color:var(--accent)}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border-light);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .15s;width:100%}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--danger);background:color-mix(in srgb,var(--accent) 14%,var(--card));border-color:var(--accent);color:var(--accent);box-shadow:0 0 16px -3px color-mix(in srgb,var(--accent) 45%,transparent)}
.btn-primary:disabled{opacity:.5;cursor:default}
.auth-crosslink{text-align:center;font-size:12px;color:var(--muted);margin-top:14px}
.auth-crosslink a{color:var(--accent);text-decoration:none}
.auth-crosslink a:hover{text-decoration:underline}
.pw-checklist{display:flex;flex-direction:column;gap:3px;margin:2px 0 12px;font-size:11px}
.pw-check{color:var(--muted);transition:color .15s}
.pw-check.met{color:var(--ok)}
.pw-check-icon{display:inline-block;width:14px}
</style>
<script>
// Theme is owner-scoped (see page.html's scopedGet/scopedSet) — but nobody
// is signed in yet on a pre-auth screen like this one, so there's no owner
// whose saved mode/accent it would even be correct to read. Always renders
// the fixed app default here rather than guessing; the real per-account
// theme takes over the instant they land on hub.html post-signup.
document.documentElement.setAttribute('data-theme','dark');
document.documentElement.style.setProperty('--accent','#B3A369');
document.documentElement.style.setProperty('--accent-default','#B3A369');
</script>
</head>
<body>
<div id="signup-screen">
  <div class="card">
    <div class="section-title">Create account</div>
    <p style="color:var(--muted);font-size:12px;margin:10px 0 18px">Set up your email and password to get started with SOS.</p>
    <div class="form-row" style="margin-bottom:0.75rem">
      <input type="email" id="signup-email" placeholder="Email" autocomplete="username" onkeydown="if(event.key==='Enter') document.getElementById('signup-password').focus()">
    </div>
    <div class="form-row" style="margin-bottom:0.5rem">
      <input type="password" id="signup-password" placeholder="Password" autocomplete="new-password" oninput="checkPasswordStrength(this.value)" onkeydown="if(event.key==='Enter') document.getElementById('signup-password-confirm').focus()">
    </div>
    <div class="pw-checklist" id="pw-checklist">
      <div class="pw-check" id="pw-check-length"><span class="pw-check-icon">○</span>At least 10 characters</div>
      <div class="pw-check" id="pw-check-upper"><span class="pw-check-icon">○</span>1 uppercase letter</div>
      <div class="pw-check" id="pw-check-number"><span class="pw-check-icon">○</span>1 number</div>
      <div class="pw-check" id="pw-check-special"><span class="pw-check-icon">○</span>1 special character</div>
    </div>
    <div class="form-row" style="margin-bottom:1rem">
      <input type="password" id="signup-password-confirm" placeholder="Confirm password" autocomplete="new-password" onkeydown="if(event.key==='Enter') handleSignup()">
    </div>
    <button class="btn btn-primary" id="signup-btn" onclick="handleSignup()">Create account</button>
    <div id="signup-error" style="color:var(--danger);font-size:12px;margin-top:10px;min-height:18px"></div>
    <div class="auth-crosslink">Already have an account? <a href="login.html">Sign in here</a></div>
  </div>
</div>
<script src="public/auth.js"></script>
<script>
// Password strength rules — shared verbatim with reset-password.html (same
// no-shared-module pattern as everything else here, so it's duplicated, not
// imported). Real-time checklist, not just a rejection on submit.
const PW_RULES={
  length:pw=>pw.length>=10,
  upper:pw=>/[A-Z]/.test(pw),
  number:pw=>/[0-9]/.test(pw),
  special:pw=>/[^A-Za-z0-9]/.test(pw),
};
const checkPasswordStrength=pw=>{
  let allMet=true;
  for(const key in PW_RULES){
    const met=PW_RULES[key](pw);
    if(!met)allMet=false;
    const el=document.getElementById(`pw-check-${key}`);
    if(el){el.classList.toggle('met',met);el.querySelector('.pw-check-icon').textContent=met?'✓':'○';}
  }
  return allMet;
};

// signup.html is the real account-creation entry point — reached only via
// index.html's "Get started" button (the splash/landing gate). Uses the
// same Supabase Auth REST calls as login.html's handleLogin, just against
// the /signup endpoint instead of /token, with a redirect_to so the
// confirmation email's link lands back on confirm.html carrying a session
// (implicit grant, same mechanism as a magic link) instead of Supabase's
// default landing page.
const handleSignup=async()=>{
  const btn=document.getElementById('signup-btn');
  const errEl=document.getElementById('signup-error');
  const emailEl=document.getElementById('signup-email');
  const pwEl=document.getElementById('signup-password');
  const pwConfirmEl=document.getElementById('signup-password-confirm');
  const email=emailEl.value.trim();
  const pw=pwEl.value;
  const pwConfirm=pwConfirmEl.value;
  errEl.textContent='';
  if(!email){errEl.textContent='Enter your email.';return;}
  if(!checkPasswordStrength(pw)){errEl.textContent='Password doesn\'t meet all the requirements above.';return;}
  if(pw!==pwConfirm){errEl.textContent='Passwords don\'t match.';return;}

  btn.disabled=true;btn.textContent='Creating account…';
  try{
    const redirectTo=new URL('confirm.html',window.location.href).href;
    const body={email,password:pw};
    const url=`${SB_URL}/auth/v1/signup?redirect_to=${encodeURIComponent(redirectTo)}`;
    const resp=await fetch(url,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await resp.json().catch(()=>null);

    if(resp.ok && data?.access_token){
      // Email confirmations disabled on this project — signup returns a
      // real session immediately, same shape as the /token login response.
      setAuthSession({access_token:data.access_token,refresh_token:data.refresh_token,expires_at:Date.now()+data.expires_in*1000,user:data.user});
      window.location.href='hub.html';
      return;
    }

    if(resp.ok && Array.isArray(data?.identities) && data.identities.length===0){
      // Supabase's documented signal for "this email is already registered
      // and confirmed" — it returns 200 with an empty identities array
      // instead of an error, to avoid leaking which emails exist.
      errEl.textContent='An account with this email already exists. Try signing in instead.';
      btn.disabled=false;btn.textContent='Create account';
      return;
    }

    if(resp.ok){
      // Fresh account, email confirmation required before sign-in works —
      // hand off to the dedicated waiting screen instead of a message here.
      window.location.href=`verify-email.html?email=${encodeURIComponent(email)}`;
      return;
    }

    const msg=data?.msg||data?.error_description||data?.error||`Signup failed (${resp.status})`;
    console.error('Signup failed',{status:resp.status,data});
    if(/already registered|already exists/i.test(msg)){
      errEl.textContent='An account with this email already exists. Try signing in instead.';
    }else{
      errEl.textContent=msg;
    }
    btn.disabled=false;btn.textContent='Create account';
  }catch(e){
    console.error('Signup error',e);
    errEl.textContent='Something went wrong. Try again.';
    btn.disabled=false;btn.textContent='Create account';
  }
};

(async function(){
  const authed=await initAuth();
  if(authed) window.location.href='hub.html';
})();
</script>
</body>
</html>
